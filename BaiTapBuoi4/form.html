<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký thành viên</title>
    <style>
        .form-group {
            margin-bottom: 10px;
        }

        fieldset {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        legend {
            font-weight: bold;
            padding: 0 10px;
            color: #333;
        }

        label {
            display: inline-block;
            width: 140px;
        }


        .button-group {
            display: flex;
            gap: 30px;
            margin-top: 10px;
        }

        .btn-submit {
            padding: 12px 24px;
            background-color: red;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

    </style>
</head>
<body>
<form action="https://api-gateway.f8.edu.vn/action_page.php" method="post" enctype="multipart/form-data">
    <fieldset>
        <legend>Thông tin cơ bản</legend>

        <div class="form-group">
            <label for="student_id">Mã học viên:</label>
            <input type="text" id="student_id" name="student_id" value="F8-2024-ABC" readonly tabindex="1">
        </div>

        <div class="form-group">
            <label for="fullname">Họ và tên: </label>
            <input type="text" id="fullname" name="fullname" placeholder="Nguyễn Văn A" required autofocus tabindex="2">
        </div>

        <div class="form-group">
            <label for="email">Email: </label>
            <input type="email" id="email" name="email" placeholder="example@gmail.com" required tabindex="3">
        </div>

        <div class="form-group">
            <label for="password">Mật khẩu:</label>
            <input type="password" id="password" name="password" required minlength="6" autocomplete="off" tabindex="4">
        </div>

        <div class="form-group">
            <label for="confirm_password">Nhập lại mật khẩu:</label>
            <input type="password" id="confirm_password" name="confirm_password" required autocomplete="off"
                   tabindex="5">
        </div>

        <div class="form-group">
            <label for="phone">Số điện thoại:</label>
            <input type="tel" id="phone" name="phone" placeholder="0xxxxxxxxx" pattern="^0[0-9]{9}$" required
                   title="Vui lòng nhập 10 chữ số, bắt đầu bằng số 0" tabindex="6">
        </div>

        <div class="form-group">
            <label for="birthday">Ngày sinh:</label>
            <input type="date" id="birthday" name="birthday" required tabindex="7">
        </div>

        <div class="form-group">
            <label for="age">Tuổi:</label>
            <input type="number" id="age" name="age" min="1" max="120" required tabindex="8">
        </div>

        <div class="form-group">
            <label for="website">Website cá nhân:</label>
            <input type="url" id="website" name="website" placeholder="https://..." required tabindex="9">
        </div>

        <div class="form-group">
            <label for="address">Địa chỉ:</label>
            <input type="text" id="address" name="address" required placeholder="Số nhà, đường, phường/xã"
                   tabindex="10">
        </div>

        <div class="form-group">
            <label for="zipcode">Mã bưu chính:</label>
            <input type="text" id="zipcode" name="zipcode" maxlength="6" placeholder="700000" required tabindex="11">
        </div>
    </fieldset>

    <fieldset>
        <legend>Thông tin bổ sung</legend>
        <div class="form-group">
            <label>Giới tính:</label>

            <input type="radio" id="male" name="gender" value="male" required tabindex="12">
            <label for="male" style="width: auto; cursor: pointer;">Nam</label>

            <input type="radio" id="female" name="gender" value="female" tabindex="13">
            <label for="female" style="width: auto; cursor: pointer;">Nữ</label>

            <input type="radio" id="other" name="gender" value="other" tabindex="14">
            <label for="other" style="width: auto; cursor: pointer;">Khác</label>
        </div>

        <div class="form-group">
            <label>Sở thích:</label>

            <input type="checkbox" id="book" name="hobby[]" value="book" tabindex="15">
            <label for="book" style="width: auto; cursor: pointer;">Đọc sách</label>

            <input type="checkbox" id="music" name="hobby[]" value="music" tabindex="16">
            <label for="music" style="width: auto; cursor: pointer;">Nghe nhạc</label>

            <input type="checkbox" id="travel" name="hobby[]" value="travel" tabindex="17">
            <label for="travel" style="width: auto; cursor: pointer;">Du lịch</label>

            <input type="checkbox" id="code" name="hobby[]" value="code" tabindex="18">
            <label for="code" style="width: auto; cursor: pointer;">Lập trình</label>

            <input type="checkbox" id="cook" name="hobby[]" value="cook" tabindex="19">
            <label for="cook" style="width: auto; cursor: pointer;">Nấu ăn</label>

            <input type="checkbox" id="sport" name="hobby[]" value="sport" tabindex="20">
            <label for="sport" style="width: auto; cursor: pointer;">Thể thao</label>
        </div>

        <div class="form-group">
            <label for="education">Trình độ học vấn:</label>
            <select id="education" name="education" tabindex="21">
                <option value="Trung học">Trung học</option>
                <option value="Cao đẳng">Cao đẳng</option>
                <option value="Đại học">Đại học</option>
                <option value="Sau đại học">Sau đại học</option>
            </select>
        </div>

        <div class="form-group">
            <label for="city">Tỉnh / Thành phố:</label>
            <select id="city" name="city[]" multiple size="5" tabindex="22">
                <option value="hungyen">Hưng Yên</option>
                <option value="hanoi">Hà Nội</option>
                <option value="hochiminh">TP. Hồ Chí Minh</option>
                <option value="danang">Đà Nẵng</option>
                <option value="haiphong">Hải Phòng</option>
            </select>
            <span style="display: block; color: #666; font-size: 12px; margin-top: 5px;">* Giữ phím Ctrl (Windows) hoặc Command (Mac) để chọn nhiều tỉnh thành.</span>
        </div>

        <div class="form-group">
            <label for="job">Nghề nghiệp:</label>
            <select id="job" name="job" tabindex="23">
                <option value="hocsinh">Học sinh</option>
                <option value="sinhvien">Sinh viên</option>
                <option value="nhanvienvp">Nhân viên văn phòng</option>
                <option value="laptrinhvien">Lập trình viên</option>
                <option value="other">Khác</option>
            </select>
        </div>

        <div class="form-group">
            <label>Khóa học quan tâm:</label>

            <input type="checkbox" id="html" name="course[]" value="html" tabindex="24">
            <label for="html" style="width: auto; cursor: pointer;">HTML-CSS</label>

            <input type="checkbox" id="js" name="course[]" value="js" tabindex="25">
            <label for="js" style="width: auto; cursor: pointer;">JavaScript</label>

            <input type="checkbox" id="react" name="course[]" value="react" tabindex="26">
            <label for="react" style="width: auto; cursor: pointer;">ReactJS</label>

            <input type="checkbox" id="nodejs" name="course[]" value="nodejs" tabindex="27">
            <label for="nodejs" style="width: auto; cursor: pointer;">NodeJS</label>

            <input type="checkbox" id="python" name="course[]" value="python" tabindex="28">
            <label for="python" style="width: auto; cursor: pointer;">Python</label>
        </div>

        <div class="form-group">
            <label>Hình thức học:</label>

            <input type="radio" id="on" name="study_type" value="online" required tabindex="29">
            <label for="on" style="width: auto; cursor: pointer;">Online</label>

            <input type="radio" id="off" name="study_type" value="offline" tabindex="30">
            <label for="off" style="width: auto; cursor: pointer;">Offline</label>
        </div>

        <div class="form-group">
            <label for="bio">Giới thiệu bản thân:</label><br>
            <textarea id="bio" name="bio" rows="4" placeholder="Viết vài dòng về bản thân..." required
                      tabindex="31"></textarea>
        </div>

        <div class="form-group">
            <label for="avatar">Ảnh đại diện:</label><br>
            <input type="file" id="avatar" name="avatar" accept=".jpg,.png" required tabindex="32">
        </div>

        <div class="form-group">
            <label for="cv">CV / Hồ sơ:</label><br>
            <input type="file" id="cv" name="cv" accept=".pdf,.doc,.docx" required tabindex="33">
        </div>
    </fieldset>

    <fieldset>
        <legend>Input đặc biệt</legend>

        <div class="form-group">
            <label>Màu yêu thích:</label>
            <input type="color" id="color" name="fav_color" value="#ff6600" required tabindex="34">
        </div>

        <div class="form-group">
            <label style="width: 180px">Mức độ hài lòng (0-10):</label>
            <input type="range" id="satisfaction" name="satisfaction" min="0" max="10" value="5" required tabindex="35">
        </div>

        <div class="form-group">
            <label for="study_time">Giờ học trong ngày:</label>
            <input type="time" id="study_time" name="study_time" required tabindex="36">
        </div>

        <div class="form-group">
            <label for="start_month">Tháng bắt đầu học:</label>
            <input type="month" id="start_month" name="start_month" required tabindex="37">
        </div>

        <div class="form-group">
            <label for="start_week">Tuần bắt đầu học:</label>
            <input type="week" id="start_week" name="start_week" required tabindex="38">
        </div>

        <div class="form-group">
            <label for="register_at">Ngày & giờ đăng ký:</label>
            <input type="datetime-local" id="register_at" name="register_at" required tabindex="39">
        </div>

        <div class="form-group">
            <label for="search_course">Tìm kiếm khóa học:</label>
            <input type="search" id="search_course" name="search_course" placeholder="Nhập tên khóa học..." required
                   tabindex="40">
        </div>

        <div class="form-group">
            <label for="experience">Số năm kinh nghiệm:</label>
            <input type="number" id="experience" name="experience" min="0" max="50" step="1" required tabindex="41">
        </div>

        <div class="form-group">
            <label style="width:220px" for="budget">Mức học phí mong muốn (VNĐ):</label>
            <input type="range" id="budget" name="budget" min="0" max="5000000" step="100000" value="1000000"
                   tabindex="42">
        </div>

        <div class="form-group">
            <label style="width:200px" for="fav_lang">Ngôn ngữ lập trình yêu thích:</label>
            <input type="text" id="fav_lang" name="fav_lang" placeholder="VD: JavaScript, Python..." tabindex="43">
        </div>
    </fieldset>

    <fieldset>
        <legend>Xác nhận & điều khoản</legend>
        <div class="form-group">
            <label style="display: block; margin-bottom: 5px; white-space: nowrap;">
                <input type="checkbox" name="agree_terms" id="agree_terms" required tabindex="44">
                Tôi đồng ý với điều khoản sử dụng
            </label>

            <label style="display: block; margin-bottom: 5px; white-space: nowrap;">
                <input type="checkbox" name="subscribe" id="subscribe" tabindex="45">
                Nhận thông báo qua email
            </label>

            <label style="display: block; margin-bottom: 15px; white-space: nowrap;">
                <input type="checkbox" name="sms_notify" id="sms_notify" tabindex="46">
                Nhận thông báo qua SMS
            </label>
        </div>

        <div class="form-group">
            <label for="ref_code">Mã giới thiệu:</label><br>
            <input type="text" id="ref_code" name="ref_code" placeholder="Nhập mã nếu có" tabindex="47">
        </div>

        <div class="form-group">
            <label for="promo_code">Mã giảm giá:</label><br>
            <input type="text" id="promo_code" name="promo_code" value="HET_HAN_2024" disabled>
            <span style="font-size: 12px; color: red;">(Đã hết hạn, không thể sử dụng)</span>
        </div>

        <input type="hidden" name="course_id" value="F8_2024">
        <input type="hidden" name="utm_source" value="website">
    </fieldset>

    <div class="button-group">
        <button type="submit" class="btn-submit" tabindex="48">Đăng ký ngay</button>
        <button type="reset" tabindex="49">Nhập lại</button>
    </div>
</form>
</body>
</html>
