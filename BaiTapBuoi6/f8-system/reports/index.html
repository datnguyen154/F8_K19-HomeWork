<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Reports Page</title>
        <link rel="stylesheet" href="../css/base.css" />
        <link rel="stylesheet" href="../css/theme.css" />
    </head>
    <body>
        <h1>REPORT PAGE</h1>
        <!--
        Phan tu nay co: tag(p) + class(.title) + nam trong id(#main)
        Selector thang: .title
        Vi: class co do uu tien cao hon tag va style ke thua tu #main

        Mau hien thi: theo CSS cua .title
        -->
        <h2 class="title">Thong ke he thong</h2>
        <div class="section" id="main">
            <p class="title">Tong so hoc vien</p>
            <!--
            Phan tu nay co: tag(p) + class(.big) + nam trong id(#main)
            Selector thang: .big
            Vi: class co do uu tien cao hon tag va style ke thua tu #main

            Mau hien thi: theo CSS cua .big
            -->
            <p class="big">Tong so khoa hoc</p>
            <p style="color: rgb(194, 194, 28)">Tong so don hang</p>
            <!--
            Phan tu nay co: tag(p) + class(.highlight) + nam trong id(#main)
            Selector thang: .highlight
            Vi: class co do uu tien cao hon tag va style ke thua tu #main

            Mau hien thi: theo CSS cua .highlight
            -->
            <p class="highlight">Doanh thu</p>
        </div>
    </body>
</html>
