<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Teachers Page</title>
        <link rel="stylesheet" href="../css/base.css" />
        <link rel="stylesheet" href="../css/theme.css" />
        <style>
            .section {
                color: brown;
            }
        </style>
    </head>
    <body>
        <h1>TEACHERS PAGE</h1>
        <!-- Phan tu nay co: tag(h2) + class(.title) + id(#special)
            Selector thang: id(#special) vi id co do uu tien cao hon 2 cai kia 
            Mau hien thi: rgb(161, 213, 28)
        -->
        <h2 class="title" id="special">Danh sach giang vien</h2>
        <!-- Phan tu nay co: tag(h3) + class(.section) + internal style
            Selector thang: internal style vi co do uu tien hon va duoc viet sau cung 
            Mau hien thi: brown
        -->
        <h3 class="section">Giang vien HTML</h3>
        <h3 class="section">Giang vien CSS</h3>
        <h3 class="section">Giang vien Javascript</h3>
        <h3 class="section">Giang vien React</h3>
    </body>
</html>
